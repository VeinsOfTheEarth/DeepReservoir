name: deepreservoir
channels:
  - pytorch        # for PyTorch
  - conda-forge    # everything else
dependencies:
  - python=3.10
  - scikit-learn
  - numpy
  - pandas
  - pyarrow        # pandas.read_parquet() support
  - scipy          # interpolation/stats you'll want for hydrology
  - matplotlib
  - pyyaml         # for simple experiment/config files
  - gymnasium
  - stable-baselines3
  - pytorch
  - cpuonly        # CPU build; swap lines below if you have a CUDA GPU
  # - pytorch-cuda=12.1      # (GPU option) requires the nvidia channel
  # - nvidia::cuda-toolkit   # (GPU option) if you actually build CUDA ops
  - tensorboard    # training logs/metrics
  - tqdm           # progress bars
  - pip
